# Единая точка входа (контракт №6): :8080 — статика SPA + прокси /api/ → api:3000.
# SSE-локация с proxy_buffering off добавится в iter 9.
server {
	listen 8080;

	root /usr/share/nginx/html;
	index index.html;

	# Срез префикса (trailing slash в proxy_pass): /api/tickets → /tickets —
	# тот же контракт, что Vite dev proxy
	location /api/ {
		proxy_pass http://api:3000/;
	}

	# SPA-fallback
	location / {
		try_files $uri /index.html;
	}
}
