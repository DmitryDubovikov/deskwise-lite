# Единая точка входа (контракт №6): :8080 — статика SPA + прокси /api/ → api:3000.
server {
	listen 8080;

	root /usr/share/nginx/html;
	index index.html;

	# SSE-локация (контракт №6, iter 9): без proxy_buffering nginx копил бы
	# токены до полного ответа — стриминг умирал бы на границе. Regex-location
	# не допускает URI в proxy_pass — префикс /api срезается rewrite'ом.
	location ~ ^/api/tickets/[^/]+/suggest-reply$ {
		rewrite ^/api(/.*)$ $1 break;
		proxy_pass http://api:3000;
		proxy_buffering off;
	}

	# Срез префикса (trailing slash в proxy_pass): /api/tickets → /tickets —
	# тот же контракт, что Vite dev proxy
	location /api/ {
		proxy_pass http://api:3000/;
	}

	# SPA-fallback
	location / {
		try_files $uri /index.html;
	}
}
