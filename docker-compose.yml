services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dw
      POSTGRES_PASSWORD: dw
      POSTGRES_DB: dw
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw -d dw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
