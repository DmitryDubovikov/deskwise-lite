services:
  # Полный стек (контракт №6): web(nginx :8080) → api:3000 → db.
  # Наружу торчит только nginx; Postgres публикуется для локального dev/тестов.
  api:
    build: ./api
    environment:
      DW_DATABASE_URL: postgresql://dw:dw@db:5432/dw
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "8080:8080"
    depends_on:
      - api

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dw
      POSTGRES_PASSWORD: dw
      POSTGRES_DB: dw
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw -d dw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
